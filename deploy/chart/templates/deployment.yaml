apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels: { app: {{ .Release.Name }} }
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: { app: {{ .Release.Name }} }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels: { app: {{ .Release.Name }} }
    spec:
      securityContext: { runAsNonRoot: true, runAsUser: 1000 }
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: {{ .Values.service.apiPort }} }
            - { name: mgmt, containerPort: {{ .Values.service.mgmtPort }} }
          envFrom:
            - configMapRef: { name: {{ .Release.Name }}-config }
            - secretRef:    { name: {{ .Release.Name }}-secret }
          readinessProbe:
            httpGet: { path: {{ .Values.probes.readinessPath }}, port: {{ .Values.probes.port }} }
            initialDelaySeconds: 25
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: {{ .Values.probes.livenessPath }}, port: {{ .Values.probes.port }} }
            initialDelaySeconds: 40
            periodSeconds: 20
          resources: {{- toYaml .Values.resources | nindent 12 }}
