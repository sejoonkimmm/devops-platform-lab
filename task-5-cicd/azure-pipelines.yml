trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04

variables:
  - group: app-secrets
  - name: NODE_VERSION
    value: '20.x'
  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm

stages:
  - stage: Validate
    displayName: Lint + unit tests
    jobs:
      - job: Lint
        steps:
          - template: templates/setup-node.yml
          - script: npm run lint
            displayName: ESLint
      - job: UnitTests
        steps:
          - template: templates/setup-node.yml
          - script: npm test
            displayName: Unit tests

  - stage: IntegrationTest
    dependsOn: Validate
    jobs:
      - job: IntegrationTests
        steps:
          - template: templates/setup-node.yml
          - script: npm run test:integration
            displayName: Integration tests
            env:
              DB_PASSWORD: $(DB_PASSWORD)

  - stage: Build
    dependsOn: IntegrationTest
    jobs:
      - job: BuildApp
        steps:
          - template: templates/setup-node.yml
          - script: npm run build
            displayName: Build
          - publish: dist
            artifact: app

  - stage: Deploy
    dependsOn: Build
    jobs:
      - deployment: DeployProd
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: app
                - script: |
                    set -euo pipefail
                    curl -sf -X POST https://deploy.example.com/release \
                      -H "Authorization: Bearer $(API_KEY)" \
                      -d @$(Pipeline.Workspace)/app/manifest.json
                  displayName: Release
