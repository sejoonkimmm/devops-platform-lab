apiVersion: batch/v1
kind: CronJob
metadata:
  name: weekly-report
  namespace: pricing
spec:
  schedule: "0 6 * * 1"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          containers:
            - name: weekly-report
              image: ghcr.io/sejoonkimmm/weekly-report:1.0.0
              envFrom:
                - secretRef:
                    name: report-db
              env:
                - name: REPORT_OUTPUT_DIR
                  value: /data/reports
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 256Mi
              volumeMounts:
                - name: reports
                  mountPath: /data/reports
          volumes:
            - name: reports
              persistentVolumeClaim:
                claimName: weekly-reports
