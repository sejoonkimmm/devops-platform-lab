# Shared setup: checkout, Node, cached deps. Reused by every job so install happens
# the same way once per job instead of a slow, uncached `npm install` copy-pasted everywhere.
steps:
  - checkout: self
  - task: NodeTool@0
    inputs:
      versionSpec: $(NODE_VERSION)
  - task: Cache@2
    inputs:
      key: 'npm | "$(Agent.OS)" | package-lock.json'
      restoreKeys: 'npm | "$(Agent.OS)"'
      path: $(npm_config_cache)
  - script: npm ci
    displayName: Install (npm ci)
