# Improved pipeline. See docs/cicd-improvements.md for the reasoning behind each change.
trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04            # pinned, not 'latest' -> reproducible builds

variables:
  - group: app-secrets             # secrets come from a Library group backed by Key Vault, never inline
  - name: NODE_VERSION
    value: '20.x'
  - name: npm_config_cache
    value: $(Pipeline.Workspace)/.npm

stages:
  - stage: Validate
    displayName: Lint + unit tests
    jobs:
      - job: Lint
        steps:
          - template: templates/setup-node.yml
          - script: npm run lint
            displayName: ESLint       # no continueOnError -> lint can fail the build again
      - job: UnitTests                # no dependsOn -> runs in parallel with Lint
        steps:
          - template: templates/setup-node.yml
          - script: npm test
            displayName: Unit tests

  - stage: IntegrationTest
    dependsOn: Validate
    jobs:
      - job: IntegrationTests
        steps:
          - template: templates/setup-node.yml
          - script: npm run test:integration
            displayName: Integration tests
            env:
              DB_PASSWORD: $(DB_PASSWORD)   # injected from the secret group at runtime

  - stage: Build
    dependsOn: IntegrationTest
    jobs:
      - job: BuildApp
        steps:
          - template: templates/setup-node.yml
          - script: npm run build
            displayName: Build
          - publish: dist
            artifact: app

  - stage: Deploy
    dependsOn: Build
    jobs:
      - deployment: DeployProd
        environment: production      # environment gate = manual approval + deploy history + rollback target
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: app
                - script: |
                    set -euo pipefail
                    curl -sf -X POST https://deploy.example.com/release \
                      -H "Authorization: Bearer $(API_KEY)" \
                      -d @$(Pipeline.Workspace)/app/manifest.json
                  displayName: Release
