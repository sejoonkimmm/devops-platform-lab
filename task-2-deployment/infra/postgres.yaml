apiVersion: v1
kind: Namespace
metadata: { name: pricing }
---
# Stand-in for a managed database (RDS). On a real cluster this would be a
# postgres operator (Zalando / CloudNativePG) or a managed service, which is
# why it lives outside the app chart: the DB lifecycle is not an app release.
# No PVC on purpose; this is a throwaway demo cluster.
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres, namespace: pricing }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata: { labels: { app: postgres } }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - { name: POSTGRES_DB, value: springboot_demo }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
          ports: [ { containerPort: 5432 } ]
          readinessProbe:
            exec: { command: ["pg_isready","-U","postgres"] }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: pricing }
spec:
  selector: { app: postgres }
  ports: [ { port: 5432, targetPort: 5432 } ]
