replicaCount: 2
image:
  repository: ghcr.io/sejoonkimmm/springboot-4-demo
  tag: "sha-9bb4e89"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  apiPort: 8080
  mgmtPort: 8081
config:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/springboot_demo
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
secret:
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres
resources:
  requests: { cpu: 200m, memory: 512Mi }
  limits:   { cpu: "1",   memory: 1Gi }
probes:
  port: 8081
  readinessPath: /actuator/health/readiness
  livenessPath: /actuator/health/liveness
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 65
route:
  enabled: true
  gatewayName: pricing-gateway
  host: pricing.local
pdb:
  enabled: true
  minAvailable: 1
