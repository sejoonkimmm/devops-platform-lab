replicaCount: 2
image:
  repository: ghcr.io/sejoonkimmm/springboot-4-demo
  tag: "sha-9bb4e89"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  apiPort: 8080
  mgmtPort: 8081
config:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/springboot_demo
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
secret:
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres
# cpu is requested but not limited. a cpu limit only throttles, and a throttled
# pod looks healthy on the graph while feeling slow to callers.
# memory request equals limit, since memory is incompressible.
resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    memory: 1Gi
probes:
  port: 8081
  readinessPath: /actuator/health/readiness
  livenessPath: /actuator/health/liveness
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 65
route:
  enabled: true
  gatewayName: pricing-gateway
  host: pricing.local
pdb:
  enabled: true
  minAvailable: 1
